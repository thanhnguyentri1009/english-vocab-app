<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>English Vocabulary Builder</title>
    <!--
      GitHub Pages is a static host: it has no server-side router, so a
      direct load or refresh of a client-side route like /english-vocab-app/b1
      hits this 404 page instead of index.html. This redirects to index.html,
      encoding the real path in the query string so index.html can restore it
      (see the matching script there) before React Router takes over.
      https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      var segmentCount = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + segmentCount)
            .join('/') +
          '/?redirect=' +
          encodeURIComponent(
            l.pathname
              .slice(1)
              .split('/')
              .slice(segmentCount)
              .join('/') +
              l.search +
              l.hash,
          ),
      )
    </script>
  </head>
  <body></body>
</html>
